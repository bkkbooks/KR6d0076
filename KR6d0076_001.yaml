body:
  text: 明海印沙門釋德清述原夫世尊唯以此一大事因緣故出現於世所謂開示一切眾生各各本有佛之知見令其悟入即得現前實證唯此一事更無餘事悟此知見即登佛地故名一乘既如來出世唯為此一大事故所說之法唯有一乘更無餘乘而一代時教其所顯者唯一乘理行因果而已由前四十年中根機未熟故所開示者特三乘理行由顯理未圓故行匪真行而果非真果皆非究竟佛慧但為資發前導皆為方便權設以為入佛智慧之門耳然言雖方便而意實指歸一乘寂滅場地如標月指故云我今知諸眾生有種種欲深心所著隨其本性以種種因緣譬喻言詞方便力而為說法如此皆為得一佛乘一切種智故是則凡所言說皆為一乘奈彼劣解之機如言取執不得離言之旨故佛於般若會上多方淘汰根機漸熟故前此於楞伽會上說離心意識自覺聖智境界以破外道妄想之見以袪小乘名言之執直示究竟一乘實相離言之道直欲眾生現前頓證諸佛自覺聖智之地今則已蒙直指人人本有佛之知見即是諸佛自覺聖智則諸聞者易信易入根機已熟故於此法華會上依前智境直示妙行以為真因將欲依此真因頓契真果故最初建言即云說無量義經入無量義處三昧於無量義者殊非多多之謂也葢顯示此一乘自覺聖智境界離心意識限量故此則頓以離言之智直示眾生令其默識而悟入之可謂先以定動者矣然此智境非中道妙智不能入故放眉間白毫相光要顯示眾生日用根塵識界即諸佛自覺聖智境界故光照萬八千土然生死涅槃本來平等故光中圓現法界事相生佛始終昭然在目意在顯此實相心境乃諸佛所證眾生所迷即今欲令眾生現證故直指現前纖毫不昧至若天雨四華地搖六震可謂通身吐露徹底掀翻意要人人不言而悟當下薦取由吾人未離心識依然眼鈍頭迷難免分別不能諦信以依識分別故彌勒騰疑所以必問文殊者意顯此實相妙境非智莫證故也及啟問文殊廼引燈明之本始證今日之瑞相此則曲唱傍通已為指點分明說破可謂後以智拔者矣奈何吾人知見未忘故於不言之道終難領會仍須復以言說而開導之是則凡涉語言皆方便也故世尊出定不得已而又假言說以啟之爾廼明告之曰諸佛智慧甚深無量其智慧門難解難入不獨一往四十年中所說皆為智慧之門即今日入定放光現瑞之事皆入智慧之門也惟此離言之道唯佛與佛乃能究盡殊非心識思量分別可到既曰無量豈心量可知耶昔時曲說容可不悟今特直示尚爾瞢然信乎此智慧門真難解入也何者以前無量無邊方便譬喻因緣種種言詞皆為顯示一乘欲令究竟皆得佛智慧故奈何聞者隨語生解畢竟不能悟入今日之事以化緣將畢涅槃時至勢不容己故如來極盡神力而大發揚之直欲眾生明見自心了悟實相見本法身各各現證盡捨如言之執究竟自覺聖智離言之處故始於一光東照顯法界之真機終於四法成就證普賢之常德由是觀之則全經二十八品通為發揮開示悟入佛之知見四字而所敷演者皆光中境界而已此外何有剩法耶所以然者由眾生本是佛之知見奈何本有而不知觸目而不見今欲返妄歸真必須先悟本妙明心故先示理境然後依理起行淨治塵沙無明之惑方能證入然此真理非智莫照故先依文殊大智以創始非行莫證故後以普賢妙行以成終故前二十二品皆顯示一乘圓理意將依此圓理而為真因後六品皆顯示一乘妙行意將依圓理而起妙行依妙行而成妙德智行冥合理智一如方證妙果故以普賢四行以收功所謂無不從此法界流無不還歸此法界故華嚴以信解行證為成佛之基此經以開示悟入為成佛之本由方便言說開示而發信從信而發解依解而起行行成解絕方能證入二經始終一貫意實相符由是觀之其顯理之文皆信解之旨也然顯理有二十二品其序品者乃總示法界之真機令其開悟而證入者也其從方便至法師九品經文雖曰三周說法授三根記其實別為大開一切眾生平等佛慧也以此佛慧各各具足無欠無餘但能知此無不頓證故曰凡有聞法者無一不成佛若有以此法而教人者即為大法師意顯此事雖則人人具足故如高原凡有鑿者無不得水此但正因佛性耳是須必藉緣因方能顯了而法師者即緣因也但能心契佛心行契佛行所謂入如來室著如來衣坐如來座意顯能信解受持此等法者即是法師也故曰隨順是師學得見恒沙佛是則緣緣之中慧命不斷則可終期實證至若譬喻因緣種種之說者皆欲顯此常住佛性第一義諦一心之妙皆光中之境吾人日用之事耳故但有能信此法者即入法位所以乃至持一偈一句一念隨喜者我亦與授菩提之記故皆一一授記成佛唯是但因方便開曉令生信耳非由解行而證入也故唯授記而已然雖授記而又經多劫者葢顯理則頓悟乘悟併消事非頓除因次第盡所謂頓悟漸修者也以一念頓悟自心與佛無二即名見性成佛尚有無始以來歷劫塵沙煩惱無明未能頓淨故須經歷多劫方能究竟苟能當下一念頓斷無始無明即名歷多劫矣所謂觀彼久遠猶若今日以此法中一念不生三際頓斷古今一際凡聖齊平故法師已前十品經文總為大開眾生佛之知見也然但以言開曉聞者唯信其言而已未能明見自心之妙即有所悟乃應化之跡耳非見法身境界也所謂猶處門外止宿草菴終滯權跡故須宣示法身實報真境使令頓見自心之妙方為實證是則現寶塔品乃頓示自心以顯法身之象也所謂開方便門示真實相欲令眾生知此見此實相真境耳吾人苟破無明頓開心地即此五蘊身心便見法身真佛故見七寶妙塔湧現其前高五百由旬此真實相妙法乃法身所演以說無所說故於塔中出大音聲以妙契法身故多寶印證宗本無住故塔處虗空聞無所聞故怪未曾有以此佛性常住不滅故塔中有如來全身以體即無生故凡有說此經處即皆現證以淨智妙圓故白毫光照十方以此智性人人本具各各不無故分身諸佛一一蒙光照燭以心心寂滅故徹照十方世界盡是寂滅道場以法法皆真故三變八百萬億多國通為一佛淨土到此則根境雙亡善惡齊泯故三途頓空天人不見恒沙性德本自圓成依正互融自他無礙故十方分身諸佛齊集其中然雖如是猶在半途以生滅之見未忘取捨之心未泯此所以願見多寶而未及見也此正古德所謂直饒做到如寒潭皎月靜夜鍾聲隨扣擊以無虧逐波瀾而不散猶是生死岸頭事何以故由生死幽關未能迸裂是須以無依智隨順覺性而開發之此所以釋迦住虗空中以右手指開七寶塔戶也直使無始無明一念頓破㘞地一聲虗空粉粹故如却關鑰開大城門如此則本有法身一念頓現故多寶如來全身不散如入禪定以感應道交故為聽是經而來至此以生滅情亡真應不二故釋迦多寶共同一座惟此因緣人人本具各各不無故大眾願見多寶第以生本無生非情識可到故佛座高遠以住本無住故接大眾皆在虗空此乃眾生之性德故直示如此令其共知共見現證不疑斯則諸佛之本懷已露利生之能事已畢然雖如是廼空華佛事水月道場豈實法耶故即便唱言如來不久當入涅槃欲令此法常住終古同遵意在得人期慧命無窮永永無盡故曰佛欲以此妙法付囑有在由是觀之則現寶塔一品正乃直示一切眾生日用現前佛之知見也然此甚深妙法乃諸佛自證境界無上第一秘密之藏所謂諸佛智慧甚深無量其智慧門難解難入者此也故偈文廣讚此經最為第一若有持者即得佛道方是真佛弟子且曰能解其義者則為人天眼目況實證乎斯則由信發解因開示而了悟此心故此已下從提婆達多至如來壽量五品經文皆發悟自心之象也然其此法已蒙開示人人本具各各不無奈何迷之已久煩惱根深我法纏眠頓難悟入是必借因緣而悟苦求而得是則提婆達多品乃顯悟無易難亦無愚智至若如來大智尚從多劫勤苦中來此悟之難也若龍女八歲當下頓證又何易易意顯有求者徒勞多劫亡心者悟在剎那只於生死海中一念轉變之力耳唯在法愛情忘分別念息自然了悟便登不退故龍女獻珠之頃即往南方無垢世界坐寶蓮華成等正覺也若夫憎愛之念未忘取捨之心未泯斯皆法執未盡我見未消是故不能悟淨圓覺此其鶖子智慧難免懷疑故說持品以顯上乘不堪受持此法難於涉俗利生意須上根利智廣大悲心難行能行難忍能忍妙契無生不言而喻者方堪涉俗故如來默視八十萬億那由佗菩薩此正激發小機昭廓大見耳而此菩薩頓契佛心便師子吼而願往返十方世界如法修行種種苦行皆當能忍且曰佛自知我心所謂師資雅合水乳相投是則已得其人矣雖有堪荷之人若求而不得其方亦不能悟以煩惱根深最難調伏故說四安樂行以示悟之之方意令悟此法者先以三業清淨性戒為尊必須心契佛心以大悲為首故要入如來室行合佛行以忍辱為先故要著如來衣然佛智如空無所依是必住依佛住安住法空故欲坐如來座方能頓悟此法故涉俗無難煩惱方能易破故如戰勝有功而得髻珠之賞也是須自信自心自參自悟方堪紹佛家風故從地湧出品乃顯自心開發之象也所謂從門入者不是家珍向自己胸中流出方始葢天葢地所以他方來者雖是菩薩猶尚不堪故云不須汝等護持此經我自有六萬恒河沙眾是時大千國土應聲震裂而無數菩薩同時湧出惟此恒沙性德本自圓成只在人人六根門頭放光動地應用不缺故有六萬恒河沙眾身有無量光明以根塵同源縛脫無二故先盡在此世界之下以中間無實故若交蘆故云虗空中住以現前煩惱皆從法性所流故云先所教化以事事皆真頭頭盡妙故云大眾皆是唱導之首以一行徧融一切行一法徧含一切法故一一皆有多多眷屬凡有所作皆回向法身故各詣虗空奉覲多寶釋迦二佛頭面禮足以此妙契佛心故問訊世尊種種安慰而世尊印許如此方能得聞是經入於佛慧也斯乃法身邊事非心識可到故彌勒與八千恒沙大士皆起疑心而如來至此方大開秘密直示本元常住心地故云如來今欲顯發宣說諸佛智慧諸佛自在神通之力諸佛師子奮迅之力故說壽量一品以示法身壽量竭盡本懷以顯妙明常住真心不動周圓徧十方界隨緣普應妙化無方修短隨緣隱顯無礙以明如來智慧甚深無量以種種方便示現利生以明其智慧門難解難入之意也且云我處靈山常在不滅大火所燒此土安隱以顯實相真境此非佛之知見又何能知此見此哉此佛之真知見力自覺聖智境界所以大地三乘以思量心不能測度也宜矣是則提婆達多持品安樂行從地湧出如來壽量五品經文皆令眾生悟佛知見也明矣若夫分別功德以極顯妙悟自心無為功德之勝益也然持經功德勝剎寶施福者此激勵小乘起慕大之心也多劫修行五波羅蜜不如聞如來壽量之功德者此䇿進權教菩薩令其捨權證實也其有一念隨喜功德福報難思者正顯此法以信得入也其有一念毀謗之罪窮劫不盡者所謂不信之罪眾罪之上此勸發闡提外道令發大乘正信也若有修行之功其福又不可量者意在專令凡夫一生取辦不生佛道長遠之怖也若能精持流通此經之法師則得六根清淨之功德者此廼揭示現證之一班以明精持利益又過於一念隨喜者也若常不輕可謂了悟平等真如深造而自得者故以佛性種子普觀四眾而授記也到此揀擇情忘是非執謝可謂妙悟之極如此方能堪荷大事故說神力品以顯悟心功德難思之象也故地湧之眾至此方誓持經如來極盡神力而大發揚之以顯悟心功德廣大不可思議也吾人苟能到此徹悟唯心境界則無一事而非佛法故如來於大眾前現大神力出廣長舌上至梵天也無一色而非佛身故遍身毛孔放無數色光遍照十方諸佛之身也至此境界則依正互融自他不二矣所謂無邊剎海自他不隔於毫端故十方諸佛亦復如是放無量光也十世古今始終不離於當念故諸佛亦現神力滿百千歲也如我按指海印發光咳唾掉臂皆冥真際故謦欬彈指之聲徧至十方世界也到此則一切眾生皆證圓覺有情無情齊成佛道故彼十方八部天人皆遙見佛說此妙法華經也苟能了悟自心則轉煩惱之具皆作成佛之真因故所脫嚴身之具皆成寶帳徧覆此間諸佛之上也心境廓徹限量消忘故十方國土通達無礙如一佛土也然吾佛極廣大之神力盡眾生之界門若欲以此顯示妙悟之功德經無量劫猶不能盡者以顯自覺聖智殊非心識之境界也以如來一切所有之法一切自在神力一切秘要之藏一切甚深之事皆於此經宣示顯說此所以極言一切有為莊嚴功德總不若受持此經之勝也然所心廣讚持經功德之勝如此者言雖顯法勝妙其實發起二乘樂大之心也直欲人人極證心源方堪荷負大法耳故云是人於佛道決定無有疑故此以後即說囑累品以終如來出世說法之本意焉然世尊從法座起即以右手摩從地湧出無量諸菩薩頂安慰而囑之曰我於無量百千萬億阿僧祇劫修習是難得阿耨多羅三藐三菩提法今以付囑汝等汝等應當一心流布此法廣令增益如是三摩諸菩薩頂囑當受持廣宣此法令一切眾生普得聞知者以一切眾生各各本具佛之智慧如來智慧自然智慧一向迷而不知今如來於此經中盡與開示無所秘吝所謂如來是一切眾生之大施主也且云未來世中若有一人能信如來智慧者即當演說此經使得聞知者為令其人即得佛慧故也苟能如此方便度生可謂報佛深恩矣由如來叮嚀之意也殷菩薩奉持之心也切故菩薩各各歡喜益加恭敬乃至三反俱發聲言如世尊勑當具奉行願不有慮也是則如來出世本為開示眾生佛之知見令其悟入而已今重重開示已至忘言而聞者解悟之心亦已洞徹此則眾生悟解之心已極在如來之能事已周若夫起行造修是在各人自肎耳故令十方諸佛各還本土各隨所安也尚有行證未圓故留多寶佛塔還可如故也此其二十二品通擬開示悟門以成信解之資故後六品通是以行成德是所謂先依圓理以發圓行後依圓行以證圓理解行相資方克究竟之果以顯入佛知見之極致也藥王菩薩本事已下至普賢勸發六品經文皆明以行成德以顯入佛知見之象也然發行之初必以藥王發揮者以觀智之藥治煩惱之病智起惑亡應念化成無上知覺得大自在故稱藥王眾生所以不自在者以有我法二執為礙故也二執有二一分別二俱生今既悟妙心以即心止觀之力淨破分別我法二障即登初地故藥王然身破我執之象也喜見然臂破法執之象也欲破二障非淨智不能故所師之佛名日月淨明德了悟本有法身證平等真如故得現一切色身三昧此從初地以至七地之象也以此真如內熏故服諸香油以頓捨藏識故光照八十萬億恒河沙世界其中諸佛同時讚歎如此方名是真精進是名真法供養也然前七轉識既消則根塵俱泯故其身火然千百二歲此則入正法位不離佛家故復生於日月淨明德佛國中以常光照明故云彼佛今故現在此入八地之象也然而至此雖破俱生我執尚有俱生法執未忘而法身之見未泯故白言世尊猶故在世以法身不許彼此迭相見故雲門云直饒透過得到法身邊若法執未忘己見猶存亦是光不透脫此亦須泯故本佛於夜後分入於涅槃而喜見菩薩即捨兩臂此分破俱生法執之象也所謂分別二障極喜無法執俱生地地除以但破其執不破其法故兩臂還復如故此皆資法華實相三昧之力故廣讚此經功德真實妙利凡有修者無不獲益故如寒得火如裸得衣如病得醫也若此法華三昧止觀之力深進不已從八地出當九地十地居法師位說法利生妙應無方所謂清淨妙法身湛然應一切故說妙音菩薩品以示現一切色身三昧之實證此示妙行出真入俗之象也問曰說此品時釋迦牟尼佛放大人相肉髻光明及放眉間白毫相光徧照東方百八萬億那由陀恒河沙等諸佛世界過是數已有世界名淨光莊嚴其國有佛號淨華宿王智者何耶答曰此舉果以驗一乘真因之象也按楞伽說如來最上一乘禪已乃云若聲聞緣覺能除一切過習覺法無我是時乃離三昧所醉於無漏界而得覺悟既覺悟已復入出世間上上無漏界滿足眾具當得如來不思議自在法身此法身即意生身也又云有三種意生身一三昧樂正受意生身謂初地乃至八地盡真如際已捨藏識斷俱生我執安住心海起識浪不生自心寂靜住三昧樂知自心現境界無性是則前喜見者乃住三昧樂意生身之象也而彼現一切色身三昧者乃了唯心境界之象證三昧樂之意生身也此但能受三昧中樂故不能現一切身二覺法自性性意生身謂從八地觀察覺了如幻等法悉無所有身心得如幻三昧及餘三昧門無量相力自在明如妙華莊嚴迅疾如意猶如幻夢水月鏡像非造所造如造所造一切色種種支分具足莊嚴隨入一切佛剎大眾通達自性法故是名覺法自性性意生身三謂種類俱生無行作意生身所謂覺一切佛法緣自得樂相是名種類俱生無行作意生身由是觀之而妙音菩薩品乃示第二覺法自性性意生身之象也然眉間白毫者表中道妙智乃因心之象也頂上肉髻乃無見頂相無上果覺之象也以八地菩薩證一心真如進至九地發真如用得如幻三昧現身說法居法師位故名妙音以真因心契會果覺故肉髻白毫二光齊放以入出世間上上無漏界故光徧照東方百八萬億那由陀恒河沙等諸佛世界以法報齊證故名淨光莊嚴以清淨真因妙契果體故其國有佛號淨華宿王智因果冥會則能以一音演無量法得十無盡句故此國菩薩名妙音也此位得如幻三昧及餘三昧門故得妙幢相三昧等百千萬億恒河沙等諸大三昧也以果地覺為本因心故釋迦牟尼佛光照其身也以此位菩薩能憶念本願隨入一切佛剎大眾化通自性德故願往娑婆見釋迦佛及諸菩薩也以此地菩薩能現無量自在神通如妙華莊嚴迅疾如意故不起于座身不動搖以三昧力先於座前化作八萬四千眾寶蓮華也此菩薩非身現身猶如幻夢水月鏡像非造所造如造所造一切色種種支分足具足莊嚴故目如廣大青蓮華葉正使和合百千萬月其面貌端正復過於此身真金色無量功德莊嚴威德熾盛光明照耀諸相具足如那羅延堅固之身也以此地菩薩十方諸佛所有法雲法雨悉能含受故所師之佛名雲雷音王以根根塵塵周遍法界具足法樂普於塵勞隨根示現故萬二千歲以十萬技樂并奉八萬四千七寶鉢而能承事十方諸佛淨佛國土故親近供養多佛也不動本際而作度生事業故現種種身處處為諸眾生說此經典此正當九地十地以極等覺之象也以此示眾生日用現證之象故與俱來者八萬四千人皆得現一切色身三昧而此娑婆世界無量菩薩亦得是三昧及陀羅尼也以用不離體故還歸本土圍繞白佛也然此神通妙用只在四大根塵之間身心轉變之力故四萬二千天子皆得無生法忍此正覺法自性性意生身之象也以出入三昧故有往來之相若夫觀音普門示現齊觀並照則無彼此去來之跡是則觀音妙應乃示種類俱生無作行意生身之象也然此意生身乃從等覺入於妙覺果海已得諸佛自覺聖智善樂深入妙莊嚴海逆流而出現十界身無思而應所謂妙相莊嚴聖種類身一時俱現猶如意生身土自他無障無礙故云種類俱生無作行意生身此乃入妙覺後大圓鏡智平等顯現故名普門示現神通之力也由觀音大士以如幻聞熏聞修金剛三昧力故生滅既滅寂滅現前忽然超越世出世間即得上與十方諸佛同一慈力下與六道眾生共一悲仰故能以一身普應一切故能三十二應四不思議十四無畏十九說法八難二求無不感應此妙行圓滿法華三昧之成功妙極於此矣冥心聖旨可謂理極忘情謂如何有喻齊到頭霜夜月任運落前溪信乎是法甚深奧少有能信者惟深造自得者諦信不疑耳由是觀之至此妙行既圓因契佛心故感三種加持防非離過使行人外魔無擾內習無餘方能得二轉依克全妙果故說後三品以終其會也三種加持者謂神力加持法力加持現身面言說加持如次三品當三種加持則陀羅尼品廼神力加持之象也楞伽唯二種加持謂現身面言說及手灌頂神力以此經由開示悟入故須法力耳梵語陀羅尼此云總持謂總一切法持無量義乃一心之異稱而云神呪者乃一切諸佛秘密實相心印即如世之大將兵符耳然大將而能風行八表坐靜妖氛掃除蕩淨而能致太平氣象者兵符之力也且知淮陰之智勇非握高帝之符又何以破秦楚而成定漢大業之功哉是故上根利智修行之士能一超直入奈何無始習氣微細幽潛雖以止觀之力而消磨之葢有深固幽遠殊非智力可到者苟非仰仗諸佛如來秘密心印呪輪而攻擊之倘內習一發則外魔易侵如此又何能出生死證真常而入寂光淨土哉是故修行者無有一人不仗秘密神呪收功故也葢行有顯密前正觀之力所謂顯行此陀羅尼乃密行耳首楞嚴云若修行人習氣未除應當一心誦我悉怛哆鉢怛囉秘密神呪此所以法華三昧妙行功圓世尊憂愍末法復說此陀羅尼品以深防邪誤是所謂以神力加持也首楞嚴云十方如來因此呪心得成無上正徧知覺十方如來執此呪心降伏諸魔制諸外道十方如來乘此呪心坐寶蓮華應微塵國十方如來含此呪心於微塵國轉大法輪十方如來持此呪心能於十方摩頂授記十方如來依此呪心能於十方拔濟群苦十方如來隨此呪心能於十方事善知識四威儀中供養如意恒沙如來會中為法王子十方如來行此呪心能於十方攝受親因令諸小乘於秘密藏不生驚怖十方如來誦此呪心成無上覺坐菩提樹入大涅槃十方如來傳此呪心於佛滅後付佛法事究竟住持嚴淨戒律悉得清淨又云汝等眾生未盡輪迴發心至誠取阿羅漢不持此呪而坐道場令其身心遠諸魔事無有是處噫諸佛尚然況此未法業垢眾生乎以此神呪廼佛佛心印故皆云六十二億恒河沙等諸佛所說而說呪藥王為初者以此密印為妙行之首故次即毗沙門說者以天王為護世四王乃生死界之主毗沙門乃北方之天王也北方之卦為坎坎者陷也以一陽陷於二陰之中以示生死險難之象故行人於生死險難之中而欲頓證菩提非神力加持又何以濟眾難出險道乎次即持國天王者持國乃東方之天王東方之卦曰震震者動也東為群動之首易曰吉凶悔吝生乎動也論云動必有苦是則行人於生死動亂之中而作至靜之行苟非神力加持又何以臻寂滅之境哉至若南方之卦為離離者麗也虗明之象西方之卦為兌兌者說也若夫虗明悅豫之境則無庸加持故彼二天王不須說耳而此繼之以羅剎女者羅剎乃幽昧之鬼且飛行而食人肉者女則陰邪之至此示無明羅剎業習戕害法身今以止觀研窮化無明而作妙明心光故羅剎女亦以身自擁護受持讀誦修行是經者頓令無明三毒淨盡無餘所謂令得消眾毒藥也以妙契法身潛通法界故香供為尊一切煩惱應念化成無上知覺故種種諸燈供養而為第一此則六根清淨八識圓明故六萬八千人皆得無生法忍此皆神力加持之益也神力加持外魔既消苟非法力內熏又何能淨除內障證二轉依哉故說妙莊嚴王本事品以示法力加持之象也楞伽經云若不以神力建立者則墮外道惡見妄想及諸聲聞眾魔希望不得無上菩提是故初地至七地有相觀多若不加者則墮外道惡見其八地已上無相觀多若不加者則墮聲聞二乘之地九地十地等覺不加不能入妙由是觀之則前神呪加持廼從初地至七地之象也故但言遠諸魔事今此品者廼九地已上入妙之象故言二子轉父邪心而同出家乃本覺出纏之象也何以明之妙莊嚴王者乃如來藏在纏之象也今顯發本真故曰本事以如來藏本是妙嚴果體故今迷之而為阿賴耶識名八識心王由此而有前六七轉識造種種業受種種苦若轉六識而為妙觀察智則藏識無染污可受故名淨藏若轉七識而為平等性智則分別之見即消見分亦泯即得法眼清明故名淨眼此轉染令淨之象也轉此二識全仗止觀之力故淨德夫人者止觀之象也以夫人坤德也柔順之至多內助之力又始覺之象也以止觀內資隨順覺性淨治無明名曰淨德故所生二子能轉父王之邪心耳葢以此止觀之力乃法身菩薩得無分別心與諸佛智用相應唯依法力自然修行熏習真如滅無明故故所師之佛名雲雷音宿王華智其國名淨光莊嚴也以無依智淨自心體故二子涌身虗空現諸神變轉父邪心也以六七因中轉故二子先請出家而藏識中種子習氣蒙止觀熏習之力皆轉染令淨故王後宮八萬四千眷屬皆堪任持妙法華經也然如來藏所以不出生死苦趣者皆由六識所造業力牽纏故也今六識既轉則八識之生死因絕以本來無染故淨藏菩薩已於無量百千萬億劫通達離諸惡三昧也所謂無作無造無受者以本無性故以始覺有功本覺乃顯故其王得諸佛集三昧能知諸佛祕密之藏以六七既轉而五八一時俱轉則四大根塵無不轉者故與王及群臣并四萬二千人一時共詣佛所也由轉染令淨解脫纏縛故解頸瓔珞以散佛上也以妙契法身常樂我淨涅槃妙德故於虗空中化成四種寶臺臺中有大寶牀敷百千萬天衣其上有佛結跏趺坐也葢虗空恒一真常德也天衣適體真樂德也有佛趺坐真我德也放大光明真淨德也四德之象居然可見至此止觀功圓同時出纏故王與夫人二子眷屬一齊出家此葢借法力熏習真如乃緣因佛性耳故云二子以神通變化轉我邪心令得安住於佛法中得見如來此二子是我善知識為欲發起宿世善根饒益我故來生我家此其善知識是大因緣所以化導令得見佛此皆顯示資緣因熏習之力也圓覺經云譬如銷金礦金非銷故有雖復本來金終以銷成就一成真金體不復重為礦故云我從今日不復自隨心行不生邪見憍慢瞋恚諸惡之心也一切塵勞應念清淨故爾時八萬四千人遠塵離垢於諸法中得法眼淨然非法力內熏又何以臻此哉故此品為法力加持之象也明矣今行人既仗神力加持令外魔無撓資法力加持令內障不生內外清淨身心解脫妙行功圓則所證真如與法界等是皆借果德以為因心之力也因心既圓果德亦滿故說普賢勸發品以終其會焉普賢勸發品乃現身面言說加持以顯入佛知見之象也以稱法界心修普賢行初發心時即仗此為真因故終得妙契常果然普賢有二一謂道前普賢乃等覺位謂行彌法界曰普隣極亞聖曰賢此因位也二道後普賢謂稱真法界曰普彌綸萬化曰賢此入妙覺果海不住涅槃逆流而出雖居果位不捨因門廼今之普賢也以初發心時即悟此體依此起行行起解絕故曰勸發然此普賢以法界為身遍在一切眾生動亂妄想塵勞之中與一切人天神鬼諸魔眷屬而為勞侶故從東方而來與無量大眾各現神通之力到此娑婆世界釋迦牟尼佛所也以法身真際乃離心識處故云在寶威德上王佛國此離言之道今以法力熏習而由言說通達故曰遙聞此娑婆世界說法華經與諸大眾而來聽受所謂雖復不依言語道亦復不著無言說故云唯願世尊當為說之也然而普賢如此請問世尊更無一言加答者正顯離言之道不容聲矣此正忘言絕證之象也故普賢即問於如來滅後云何能得是經向來一往諸大菩薩但問讀誦受持而已然未聞有言得之者今普賢即云得是經者足知由前解行於此證入所謂此品顯入佛之知見明矣然世尊所答得處不多亦不在多劫修行唯在成就四法於如來滅後當得是經如此而已四法者一諸佛護念二植眾德本三入正定聚四發救一切眾生之心如是成就四法於如來滅後必得是經且既曰當得而又曰必得是真實決定不易之辭也然此四法者果何意哉而成就之速如此耶起信論云分別發趣道相者謂一切諸佛所證之道一切菩薩發心趣向義故略云發心有三種一者信心成就發心二者解行發心三者證發心由前云汝等若能信受是語一切皆當得成佛道又云汝舍利弗尚於此經以信得入然而此經諸佛知見甚深秘藏非心所測唯許以信得入由是觀之此四法者乃信心成就發心者也華嚴云知一切法即心自性成就慧身不由他悟即得菩提此信心成就之謂也論曰信成就發心者發何等心略說有三種一者直心正念真如法故此所謂為諸佛護念也二者深心樂集一切諸善行故此所謂植眾德本也三者大悲心欲拔一切眾生苦故此所謂發救一切眾生之心也又云如是信心成就得發心者入正定聚畢竟不退名住如來種中正因相應此所謂入正定聚也既許以信得入是則以文殊大智止觀之力照自心源諦信唯心無外境界以此研窮是謂妙行以此妙行契乎妙智智行妙圓所謂正因相應其必得是經也宜矣是則前開解行不出信心信極道圓入乎妙覺正所謂啟明東廟智滿不異於初心此妙符華嚴始終無二故此普賢所勸發者唯此信心故言得經之道而如來示之以此四法而已又云是菩薩功德成滿於色究竟處示現一切世間最高大身謂以一念相應慧無明頓盡名一切種智自然而有不思議業能現十方利益眾生故如來滅後有能持是經者我當守護與大菩薩眾而自現身供養安慰其心其人若有忘失一句一偈我當教之還令通利也論云如菩薩地盡滿足方便一念相應覺心初起心無初相以遠離微細念故得見心性故云得見我身又云菩薩從初發意乃至菩薩究竟地心所見者名為報身此所謂以一切眾生所喜見身現其人前而為說法斯正現身面言說加持也又云若有眾生能觀無念者則為向佛智矣故云以見我故即得三昧及陀羅尼名為旋陀羅尼百千萬億旋陀羅尼法音方便陀羅尼此究竟之實證也梵語陀羅尼此云總持謂總一切法持無量義乃一心真如之異稱也論云心真如者即是一法界大總相法門體所謂心性不生不滅一切諸法唯依妄念而有差別若離心念則無一切境界之相是故一切法從本已來離言說相離名字相離心緣相畢竟平等無有變異不可破壞唯是一心故名真如此所謂旋陀羅尼也又云一切言說假名無實但隨妄念不可得故此所謂百千萬億旋陀羅尼也又云言真如者亦無有相謂言說之極因言遣言此真如體無有可遣以一切法皆同真故以一切法皆同如故當知一切法不可說不可念故名真如此所謂法音方便陀羅尼也旋者楞嚴觀音耳根圓通云旋倒聞機返聞自性旋漩也水之急流最深而有洄旋謂之漩澓以當急流而力能迴流漩澓淵源也謂念念生滅急流中而能念念隨順真如不隨妄念流轉故如水之漩澓也論云若知一切法雖說無有能說可說雖念亦無能念可念是名隨順若離於念名為得入然無念者正念也故終誡以應當一心受持讀誦正憶念如說修行正憶念者萬行之本信心之至也故若有受持讀誦正憶念解其義趣如說修行當知是人行普賢行也以一乘實相佛之知見備殫乎此法身慧命不外乎是故普賢願以神通力守護是經於如來滅後閻浮提內廣令流布使不斷絕而如來即許之曰若有持受讀誦正憶念修習書寫是法華經者當知是人則見釋迦牟尼佛如從佛口聞此經典以極種種讚歎廼至不久當得菩提其効之速既如此若有不信輕毀之者其所得惡報之重又如彼是終許其以信得入也所謂信為道元功德母長養一切諸善法惟此甚深秘藏無上法門唯許以信得入正謂發心畢竟二無別如是二心先心難故此經以文殊為唱導之首普賢為勸發之終此如來說法始終一貫之極致也萬曆乙未春予以弘法罹難被逮圜中達觀禪師在匡盧聞報驚歎乃願誦妙法蓮華經百部以求諸佛神力攝受之也頃予蒙恩宥遣之雷陽是歲冬道經白下達師遲予於江上相晤于旅泊菴中夜談及此且曰願以我之心用公之舌可乎予笑而唯唯及丙申春抵戍所正值饉劫居不遑處且即從事楞伽而又奔走行間未暇了此公案然在白毫光中不離無量義處三昧也戊戌夏日菩提樹下弟子來從遊者十餘輩相與結夏於穹廬同誦此經幾二百部予時為舉揚此事以開示之休夏自恣曰弟子性澄請益其綱宗予因提絜吾佛言外之旨以示之且將以報達師知予所轉妙法華經如是而已老盧云心迷法華轉心悟轉法華然不涉唇脗一句正不在紙墨文字間也時會聽者各各歡喜受奉行梓之以廣法施普願見聞隨喜者同得現一切色身三昧云萬曆戊戌除日憨山道人德清書於楞伽室
